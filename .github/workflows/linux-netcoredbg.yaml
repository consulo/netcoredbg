name: linux-netcoredbg

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            cc: /usr/bin/clang
            cxx: /usr/bin/clang++
            cmake_processor: x86_64
            elf_machine: Advanced Micro Devices X86-64
            runs_on: ubuntu-latest
            cross: false
          - arch: loongarch64
            cc: loongarch64-unknown-linux-gnu-gcc
            cxx: loongarch64-unknown-linux-gnu-g++
            cmake_processor: loongarch64
            elf_machine: LoongArch
            dbgshim_url: https://github.com/loongson-community/dotnet-unofficial-build/releases/download/v9.0.201%2Bloong.20250313.build.20250313/dotnet-sdk-9.0.104-linux-loongarch64.tar.gz
            loongson: true
            runs_on: ubuntu-latest
            cross: true
          - arch: riscv64
            cc: riscv64-linux-gnu-gcc
            cxx: riscv64-linux-gnu-g++
            cmake_processor: riscv64
            elf_machine: RISC-V
            dbgshim_url: https://github.com/filipnavara/dotnet-riscv/releases/download/10.0.105/dotnet-sdk-10.0.105-linux-riscv64.tar.gz
            apt: g++-riscv64-linux-gnu
            runs_on: ubuntu-latest
            cross: true

    runs-on: ${{ matrix.runs_on }}

    steps:
      - uses: actions/checkout@v4

      - name: Install cross toolchain (apt)
        if: matrix.apt
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ${{ matrix.apt }}

      - name: Install Loongson toolchain
        if: matrix.loongson
        run: |
          URL="https://github.com/loongson/build-tools/releases/download/2024.08.08/x86_64-cross-tools-loongarch64-binutils_2.43-gcc_14.2.0-glibc_2.40.tar.xz"
          wget -q "$URL" -O /tmp/loongson.tar.xz
          sudo mkdir -p /opt/loongson
          sudo tar -xf /tmp/loongson.tar.xz -C /opt/loongson --strip-components=1
          echo "/opt/loongson/bin" >> $GITHUB_PATH

      - uses: threeal/cmake-action@main
        with:
          generator: Unix Makefiles
          source-dir: .
          build-dir: ./build
          options: CMAKE_BUILD_TYPE=Release CMAKE_INSTALL_PREFIX=./install CMAKE_SYSTEM_NAME=Linux CMAKE_SYSTEM_PROCESSOR=${{ matrix.cmake_processor }} CMAKE_C_COMPILER=${{ matrix.cc }} CMAKE_CXX_COMPILER=${{ matrix.cxx }}
          build-args: --config Release

      - name: Fetch libdbgshim for cross target
        if: matrix.cross
        run: |
          set -euo pipefail
          URL="${{ matrix.dbgshim_url }}"
          echo "Downloading $URL"
          curl -L --fail "$URL" -o /tmp/dotnet-runtime.tar.gz
          mkdir -p /tmp/dotnet-runtime
          tar -xzf /tmp/dotnet-runtime.tar.gz -C /tmp/dotnet-runtime
          DBGSHIM=$(find /tmp/dotnet-runtime -name 'libdbgshim.so' -type f | head -1)
          if [ -z "$DBGSHIM" ]; then
              echo "::error::libdbgshim.so not found in downloaded .NET tarball"
              find /tmp/dotnet-runtime -type f | head -50
              exit 1
          fi
          echo "Found: $DBGSHIM"
          mkdir -p build/src
          cp "$DBGSHIM" build/src/libdbgshim.so

      - name: Install
        run: cmake --install build

      - name: Verify ELF architecture
        run: |
          set -euo pipefail
          BIN=$(find ./install -type f -name netcoredbg | head -1)
          echo "File: $BIN"
          readelf -h "$BIN" | grep -E "Class|Machine"
          MACHINE=$(readelf -h "$BIN" | awk -F: '/Machine:/ {sub(/^[ \t]+/,"",$2); print $2}')
          if [ "$MACHINE" != "${{ matrix.elf_machine }}" ]; then
              echo "::error::ELF machine mismatch. Expected '${{ matrix.elf_machine }}' for ${{ matrix.arch }}, got '$MACHINE'."
              exit 1
          fi
          echo "OK: ELF machine is '$MACHINE' as expected."

      - name: Package
        run: |
          cd install
          zip -r "$GITHUB_WORKSPACE/netcoredbg.zip" .

      - uses: actions/upload-artifact@v4
        with:
          name: netcoredbg-linux-${{ matrix.arch }}
          path: netcoredbg.zip
          if-no-files-found: error

  publish:
    needs: build
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency:
      group: binaries-publish
      cancel-in-progress: false
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Arrange binaries by os-arch
        run: |
          set -euo pipefail
          mkdir -p out
          for dir in artifacts/netcoredbg-linux-*/; do
            name=$(basename "$dir")
            arch="${name#netcoredbg-linux-}"
            mkdir -p "out/linux-$arch"
            cp "$dir"netcoredbg.zip "out/linux-$arch/"
          done
          find out -type f

      - name: Commit and push to consulo/binaries
        env:
          CONSULO_BOT_TOKEN: ${{ secrets.CONSULO_BOT_TOKEN }}
        run: |
          set -euo pipefail
          git clone "https://consulo-bot:${CONSULO_BOT_TOKEN}@github.com/consulo/binaries.git" binaries-repo
          cd binaries-repo
          git checkout master 2>/dev/null || git checkout --orphan master
          git config user.name "consulo Bot"
          git config user.email "consulo.bot@gmail.com"
          cp -r ../out/. .
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update netcoredbg linux binaries from ${GITHUB_REPOSITORY}@${GITHUB_SHA::7}"
            git push -u origin master
          fi
